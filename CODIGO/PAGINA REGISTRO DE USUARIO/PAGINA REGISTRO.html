<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Registro de Usuario - Padanito</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background-color: #ffffff;
    }
    .container {
      display: flex;
      height: 100vh;
    }
    .left {
      flex: 1;
      background-image: url("E:/1. PROYECTO DE SOFTWARE PADANITO/img/cupcake-fondo.jpg");
      background-size: cover;
      background-position: center;
      position: relative;
    }
    .logo {
  position: absolute;
  top: 20%;
  left: 50%;
  transform: translateX(-50%);
  width: 800px;
  border-radius: 50%;
}


    .right {
      flex: 1;
      background: #fafafa;
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 0 80px;
    }
    h2 {
      font-size: 32px;
      color: #8E44FF;
      font-weight: bold;
      text-align: center;
      margin-bottom: 40px;
    }
    input {
      width: 100%;
      padding: 16px;
      margin-bottom: 20px;
      border: 2px solid #8E44FF;
      border-radius: 12px;
      font-size: 16px;
      background: #fff;
      box-sizing: border-box;
    }
    .password-container {
      position: relative;
    }
    .eye {
      position: absolute;
      right: 16px;
      top: 18px;
      cursor: pointer;
      font-size: 20px;
    }
    .btn {
      width: 100%;
      padding: 16px;
      font-size: 18px;
      border: none;
      border-radius: 30px;
      color: white;
      cursor: pointer;
      background: linear-gradient(to right, #8E44FF, #E7A6FF);
      font-weight: bold;
    }
    .btn:hover {
      opacity: 0.9;
    }
  </style>

</head>
<body>

  <div class="container">

    <div class="left">
      <img src="E:/1. PROYECTO DE SOFTWARE PADANITO/img/logo-padanito.png" class="logo" alt="Logo Padanito">
    </div>

    <div class="right">
      <h2>Registro de Usuario</h2>

      <form>

        <input type="text" placeholder="Nombres" required>
        <input type="text" placeholder="Apellidos" required>
        <input type="text" placeholder="Número de cédula" required>

        <div class="password-container">
          <input type="password" id="password" placeholder="Contraseña" required>
          <span id="togglePassword" class="eye">👁️</span>
        </div>

        <button type="submit" class="btn">CREAR CUENTA</button>

      </form>

    </div>
  </div>

  <script>
    const togglePassword = document.getElementById("togglePassword");
    const password = document.getElementById("password");

    togglePassword.addEventListener("click", () => {
        password.type = (password.type === "password") ? "text" : "password";
    });
  </script>

</body>
</html>
