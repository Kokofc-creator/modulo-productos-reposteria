<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Padanito Repostería - Iniciar sesión</title>
  <style>
    :root {
      --rosa-pastel: #E7A6FF;
      --violeta-suave: #8E44FF;
      --crema: #FFF3E6;
    }

    body {
      font-family: 'Poppins', sans-serif;
      margin: 0;
      padding: 0;
      height: 100vh;
      display: flex;
      background-color: var(--crema);
    }

    .container {
      display: flex;
      width: 100%;
    }

    .left {
      flex: 1;
      background-image: url("E:/1. PROYECTO DE SOFTWARE PADANITO/img/pastel-fondo.jpg");
      background-size: cover;
      background-position: center;
      position: relative;
    }

    .logo {
      position: absolute;
      top: 20%;
      left: 50%;
      transform: translateX(-50%);
      width: 250px;
      border-radius: 50%;
    }

    .right {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      background-color: #fff;
    }

    .login-form {
      width: 80%;
      max-width: 350px;
      text-align: center;
    }

    h2 {
      color: var(--violeta-suave);
      margin-bottom: 20px;
    }

    .input-group {
      position: relative;
      margin-bottom: 20px;
    }

    input {
      width: 100%;
      padding: 12px;
      border: 2px solid var(--violeta-suave);
      border-radius: 10px;
      background: linear-gradient(to right, #FFF3E6, #E7A6FF);
      font-size: 15px;
      outline: none;
    }

    .toggle-password {
      position: absolute;
      right: 12px;
      top: 12px;
      cursor: pointer;
      font-size: 18px;
    }

    .btn-login {
      width: 100%;
      background: linear-gradient(to right, var(--violeta-suave), var(--rosa-pastel));
      border: none;
      border-radius: 20px;
      padding: 12px;
      color: white;
      font-size: 16px;
      cursor: pointer;
      transition: 0.3s;
    }

    .btn-login:hover {
      transform: scale(1.05);
    }

    .links {
      margin-top: 15px;
      font-size: 14px;
    }

    .forgot {
      color: black;
      text-decoration: underline;
      font-weight: 500;
    }

    .register {
      color: var(--violeta-suave);
      font-weight: bold;
      text-decoration: none;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="left">
      <img src="E:/1. PROYECTO DE SOFTWARE PADANITO/img/logo-padanito.png" alt="Logo Padanito Repostería" class="logo" />
    </div>
    <div class="right">
      <form class="login-form">
        <h2>Iniciar sesión</h2>
        <div class="input-group">
          <input type="email" id="email" placeholder="Correo electrónico" required />
        </div>
        <div class="input-group">
          <input type="password" id="password" placeholder="Contraseña" required />
          <span class="toggle-password" id="togglePassword">👁️</span>
        </div>
        <button type="submit" class="btn-login">Iniciar sesión</button>
        <div class="links">
          <a href="#" class="forgot">Recordar contraseña</a><br />
          <span>¿Todavía no tienes una cuenta? <a href="#" class="register">Regístrate</a></span>
        </div>
      </form>
    </div>
  </div>

  <script>
    const togglePassword = document.getElementById("togglePassword");
    const passwordInput = document.getElementById("password");

    togglePassword.addEventListener("click", () => {
      const type = passwordInput.getAttribute("type") === "password" ? "text" : "password";
      passwordInput.setAttribute("type", type);
    });

    const form = document.querySelector(".login-form");
    form.addEventListener("submit", (e) => {
      e.preventDefault();
      const email = document.getElementById("email").value;
      const password = document.getElementById("password").value;
      if (email === "" || password === "") {
        alert("Por favor, completa todos los campos.");
      } else {
        alert(`Inicio de sesión exitoso para: ${email}`);
      }
    });
  </script>
</body>
</html>
